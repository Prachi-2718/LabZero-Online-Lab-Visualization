services:
  backend:
    build: 
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
    environment:
      - DEBUG=1
    env_file:
      - ./Backend/.env
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./Frontend:/app
      # This anonymous volume prevents local node_modules from overwriting container's
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host
